services:
  postgres:
    image: postgres:17-alpine
    container_name: fintrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintrack
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fintrack-network

  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - fintrack-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    container_name: fintrack-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fintrack?schema=public
      JWT_SECRET: dev-jwt-secret-key-with-at-least-32-characters-for-development
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    network_mode: host
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        npm run dev
      "

  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    container_name: fintrack-worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fintrack?schema=public
      JWT_SECRET: dev-jwt-secret-key-with-at-least-32-characters-for-development
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    network_mode: host
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        npx prisma generate &&
        npm run dev:worker
      "

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: fintrack-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - fintrack-network
    command: npm run dev -- --host 0.0.0.0

networks:
  fintrack-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
